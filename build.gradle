def minecraftVersion = '1.18.2-R0.1-SNAPSHOT'
def commandApiVersion = '6.3.1'
def waterfallVersion = '1.18-R0.1-SNAPSHOT'

def joorVersion = '0.9.14'

repositories {
    maven { url = "https://jitpack.io" }
    maven { url = "https://repo.codemc.org/repository/maven-public/" }
}

dependencies {
    implementation project(":library:CalecheCore")

    implementation group: 'dev.jorel.CommandAPI', name: 'commandapi-core', version: commandApiVersion
    implementation group: 'io.papermc.paper', name: 'paper-api', version: minecraftVersion
    implementation group: 'org.spigotmc', name: 'spigot', version: minecraftVersion
    implementation group: 'io.github.waterfallmc', name: 'waterfall-api', version: waterfallVersion

    implementation group: 'org.jooq', name: 'joor', version: joorVersion
}

compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'
javadoc.options.encoding = 'UTF-8'
