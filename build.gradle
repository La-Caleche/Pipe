def minecraftVersion = '1.18.2-R0.1-SNAPSHOT'
def commandApiVersion = '8.5.1'
def waterfallVersion = '1.19-R0.1-SNAPSHOT'

def joorVersion = '0.9.14'
def jsonVersion = '20200518'
def reflectionsVersion = '0.10.2'

def miniMessageVersion = '4.11.0'
def platformVersion = '4.1.1'

def protocolLibVersion = '4.7.0'

repositories {
    maven { url = "https://jitpack.io" }
    maven { url = "https://repo.codemc.org/repository/maven-public/" }
    maven {
        name = "sonatype-oss-snapshots1"
        url = "https://s01.oss.sonatype.org/content/repositories/snapshots/"
    }
}

dependencies {
    implementation project(":library:CalecheCore")

    implementation group: 'dev.jorel.CommandAPI', name: 'commandapi-core', version: commandApiVersion
    implementation group: 'io.papermc.paper', name: 'paper-api', version: minecraftVersion
    implementation group: 'org.spigotmc', name: 'spigot', version: minecraftVersion
    implementation group: 'io.github.waterfallmc', name: 'waterfall-api', version: waterfallVersion

    implementation group: 'org.jooq', name: 'joor', version: joorVersion
    implementation group: 'org.json', name: 'json', version: jsonVersion
    implementation group: 'org.reflections', name: 'reflections', version: reflectionsVersion

    implementation group: 'net.kyori', name: 'adventure-text-minimessage', version: miniMessageVersion
    implementation group: 'net.kyori', name: 'adventure-platform-bungeecord', version: platformVersion
    implementation group: 'net.kyori', name: 'adventure-platform-bukkit', version: platformVersion

    implementation group: 'com.comphenix.protocol', name: 'ProtocolLib', version: protocolLibVersion
}

compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'
javadoc.options.encoding = 'UTF-8'
